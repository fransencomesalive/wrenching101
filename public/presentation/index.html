<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrenching 101 — Presentation</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <meta property="og:title" content="Presented by Mettle Cycling">
  <meta property="og:description" content="An intro for cyclists who ride confidently and wrench... less so.">
  <meta property="og:image" content="https://wrenching101.mettlecycling.com/opengraph-image">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://wrenching101.mettlecycling.com/opengraph-image">
  <link rel="stylesheet" href="/presentation/css/base.css">
  <link rel="stylesheet" href="/presentation/css/gate.css">
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="grain-canvas" aria-hidden="true"></canvas>

  <main class="gate">
    <span class="gate__eyebrow">Mettle Cycling</span>
    <h1 class="gate__title">Wrenching 101</h1>
    <p class="gate__sub">Enter the access code to continue</p>
    <form class="gate__form" id="gate-form" autocomplete="off">
      <input
        class="gate__input"
        type="password"
        id="gate-input"
        placeholder="Access code"
        autocomplete="new-password"
        autofocus
      >
      <button class="gate__btn" type="submit">Enter</button>
      <p class="gate__error" id="gate-error" aria-live="polite"></p>
    </form>
  </main>

  <script src="/presentation/js/gate.js"></script>
</body>
</html>
