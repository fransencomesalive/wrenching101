<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrenching 101 — Presentation</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/gate.css">
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="grain-canvas" aria-hidden="true"></canvas>

  <main class="gate">
    <span class="gate__eyebrow">Mettle Cycling</span>
    <h1 class="gate__title">Wrenching 101</h1>
    <p class="gate__sub">Enter the access code to continue</p>
    <form class="gate__form" id="gate-form" autocomplete="off">
      <input
        class="gate__input"
        type="password"
        id="gate-input"
        placeholder="Access code"
        autocomplete="new-password"
        autofocus
      >
      <button class="gate__btn" type="submit">Enter</button>
      <p class="gate__error" id="gate-error" aria-live="polite"></p>
    </form>
  </main>

  <script src="js/gate.js"></script>
</body>
</html>
